name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"
      - "uv.lock"
      - "pyproject.toml"
  push:
    branches: [main]
    paths:
      - "**.py"
      - "uv.lock"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run unit tests
        run: uv run pytest target_bigquery/tests/test_utils.py -v
